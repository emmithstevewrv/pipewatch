# pipewatch alert backend configuration example
# Copy relevant sections into your pipewatch config file.

[alerts.logging]
# Enable logging-based alerts (uses Python logging module)
enabled = true
# Log level to use for alerts: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = "WARNING"

[alerts.smtp]
# Enable email alerts via SMTP
enabled = false
host = "smtp.example.com"
port = 587
sender = "pipewatch@example.com"
recipients = ["ops@example.com", "oncall@example.com"]
subject_prefix = "[pipewatch]"
# Leave blank if authentication is not required
username = ""
password = ""
# Use TLS (recommended when port is 587)
use_tls = true
# Timeout in seconds for SMTP connection
timeout = 10
